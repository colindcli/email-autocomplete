<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱自动补全 - 演示</title>

  <!-- 引入组件样式 -->
  <link rel="stylesheet" href="email-autocomplete.css">

  <style>
    /* ===== 页面演示样式（与组件无关） ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .demo-container {
      width: 420px;
      padding: 40px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .demo-container h2 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .demo-container .sub {
      font-size: 14px;
      color: #999;
      margin-bottom: 20px;
    }

    .demo-container .field-group {
      margin-bottom: 18px;
    }

    .demo-container .field-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    .demo-container .field-group input {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafbfc;
      color: #1a1a2e;
    }

    .demo-container .field-group input:focus {
      border-color: #4a6cf7;
      box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.10);
      background: #ffffff;
    }

    .demo-container .field-group input::placeholder {
      color: #bbb;
    }

    .demo-divider {
      height: 1px;
      background: #f0f0f0;
      margin: 24px 0;
    }

    .demo-note {
      font-size: 13px;
      color: #aaa;
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h2>📧 邮箱自动补全</h2>
    <p class="sub">输入至少 2 个字符，自动显示补全建议</p>

    <div class="field-group">
      <label>邮箱地址</label>
      <input type="email" class="auto-email-list" placeholder="请输入邮箱地址" autocomplete="off">
    </div>

    <div class="demo-divider"></div>

    <div class="field-group">
      <label>另一个输入框（也支持 .auto-email-list）</label>
      <input type="email" class="auto-email-list" placeholder="再次输入试试" autocomplete="off">
    </div>
  </div>

  <!-- 引入组件 JS -->
  <script src="email-autocomplete.js"></script>

</body>
</html>
